<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" role="img" aria-label="I2C bus with pull-up resistors and multiple devices">
  <rect width="1000" height="430" fill="#fff"/>
  <style>
    text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#1f2933}
    .title{font-size:26px;font-weight:700}
    .small{font-size:17px}
    .dev{fill:#eff6ff;stroke:#2563eb;stroke-width:2}
    .bus{stroke:#243b53;stroke-width:5}
    .wire{stroke:#64748b;stroke-width:3}
    .res{stroke:#ef4444;stroke-width:3;fill:none}
  </style>
  <text x="40" y="44" class="title">I2C 总线连接：SCL/SDA 共线，开漏输出，上拉恢复高电平</text>
  <line x1="180" y1="150" x2="880" y2="150" class="bus"/><text x="900" y="156" class="small">SCL</text>
  <line x1="180" y1="230" x2="880" y2="230" class="bus"/><text x="900" y="236" class="small">SDA</text>
  <line x1="470" y1="70" x2="470" y2="105" class="wire"/><text x="452" y="62" class="small">VCC</text>
  <path d="M420 105 l12 12 l-24 18 l24 18 l-24 18 l24 18 l-12 12" class="res"/>
  <path d="M520 105 l12 12 l-24 18 l24 18 l-24 18 l24 18 l-12 12" class="res"/>
  <line x1="420" y1="105" x2="520" y2="105" class="wire"/>
  <line x1="420" y1="201" x2="420" y2="150" class="wire"/>
  <line x1="520" y1="201" x2="520" y2="230" class="wire"/>
  <text x="360" y="96" class="small">Rpull-up</text><text x="535" y="96" class="small">Rpull-up</text>
  <rect x="50" y="115" width="130" height="150" rx="10" class="dev"/><text x="82" y="178" class="small">Master</text><text x="78" y="205" class="small">MCU</text>
  <rect x="300" y="290" width="140" height="95" rx="10" class="dev"/><text x="330" y="330" class="small">Target 1</text><text x="332" y="357" class="small">Sensor</text>
  <rect x="540" y="290" width="140" height="95" rx="10" class="dev"/><text x="570" y="330" class="small">Target 2</text><text x="574" y="357" class="small">EEPROM</text>
  <rect x="780" y="290" width="140" height="95" rx="10" class="dev"/><text x="810" y="330" class="small">Target 3</text><text x="830" y="357" class="small">RTC</text>
  <line x1="115" y1="115" x2="115" y2="150" class="wire"/><line x1="145" y1="115" x2="145" y2="230" class="wire"/>
  <line x1="370" y1="290" x2="370" y2="150" class="wire"/><line x1="400" y1="290" x2="400" y2="230" class="wire"/>
  <line x1="610" y1="290" x2="610" y2="150" class="wire"/><line x1="640" y1="290" x2="640" y2="230" class="wire"/>
  <line x1="850" y1="290" x2="850" y2="150" class="wire"/><line x1="880" y1="290" x2="880" y2="230" class="wire"/>
</svg>
