<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="500" viewBox="0 0 1040 500" role="img" aria-labelledby="title desc">
  <title id="title">LIN schedule table flow</title>
  <desc id="desc">LIN master cycles through schedule table slots and sends headers for different frames.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.slot{fill:#fff;stroke:#334155;stroke-width:2;rx:10}.active{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:10}
      .resp{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:10}.diag{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:10}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}.title{font-size:25px;font-weight:700}.small{font-size:15px;fill:#475569}
      .arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1040" height="500"/>
  <text class="text title" x="520" y="45" text-anchor="middle">LIN 调度表轮询流程</text>

  <rect class="active" x="80" y="95" width="190" height="70"/><text class="text" x="175" y="123" text-anchor="middle">Slot 1</text><text class="small" x="175" y="148" text-anchor="middle">ID 0x10，下发控制</text>
  <rect class="resp" x="310" y="95" width="190" height="70"/><text class="text" x="405" y="123" text-anchor="middle">Slot 2</text><text class="small" x="405" y="148" text-anchor="middle">ID 0x11，左门状态</text>
  <rect class="resp" x="540" y="95" width="190" height="70"/><text class="text" x="635" y="123" text-anchor="middle">Slot 3</text><text class="small" x="635" y="148" text-anchor="middle">ID 0x12，右门状态</text>
  <rect class="diag" x="770" y="95" width="190" height="70"/><text class="text" x="865" y="123" text-anchor="middle">Slot 4</text><text class="small" x="865" y="148" text-anchor="middle">诊断/低频帧</text>

  <line class="arrow" x1="270" y1="130" x2="310" y2="130"/>
  <line class="arrow" x1="500" y1="130" x2="540" y2="130"/>
  <line class="arrow" x1="730" y1="130" x2="770" y2="130"/>
  <path class="arrow" d="M865 165 C865 235 175 235 175 170"/>

  <rect class="slot" x="185" y="300" width="670" height="92"/>
  <text class="text" x="520" y="332" text-anchor="middle">每个 Slot 中：主节点发送 Header，发布者返回 Response</text>
  <text class="small" x="520" y="360" text-anchor="middle">调度表决定帧周期、响应延迟、总线负载和诊断窗口</text>
  <text class="small" x="520" y="430" text-anchor="middle">设计不合理的调度表会造成响应慢、slot 冲突、关键控制帧被低优先级帧挤占。</text>
</svg>
