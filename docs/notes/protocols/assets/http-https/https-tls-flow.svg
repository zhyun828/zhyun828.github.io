<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="560" viewBox="0 0 1040 560" role="img" aria-labelledby="title desc">
  <title id="title">HTTPS TLS handshake simplified flow</title>
  <desc id="desc">Simplified HTTPS flow with TCP handshake, TLS ClientHello ServerHello certificate validation and encrypted HTTP.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.client{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:12}.server{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:12}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}.title{font-size:25px;font-weight:700}.small{font-size:15px;fill:#475569}
      .line{stroke:#334155;stroke-width:3}.msg{stroke:#2563eb;stroke-width:3;marker-end:url(#arrow)}.back{stroke:#16a34a;stroke-width:3;marker-end:url(#green)}.secure{stroke:#7c3aed;stroke-width:3;marker-end:url(#purple)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
    <marker id="green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/></marker>
    <marker id="purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/></marker>
  </defs>
  <rect class="bg" width="1040" height="560"/>
  <text class="text title" x="520" y="45" text-anchor="middle">HTTPS / TLS 简化流程</text>
  <rect class="client" x="105" y="80" width="180" height="58"/><text class="text" x="195" y="116" text-anchor="middle">Client</text>
  <rect class="server" x="755" y="80" width="180" height="58"/><text class="text" x="845" y="116" text-anchor="middle">Server</text>
  <line class="line" x1="195" y1="138" x2="195" y2="500"/>
  <line class="line" x1="845" y1="138" x2="845" y2="500"/>
  <line class="msg" x1="205" y1="175" x2="835" y2="175"/><text class="text" x="520" y="160" text-anchor="middle">1. TCP 三次握手</text>
  <line class="msg" x1="205" y1="235" x2="835" y2="235"/><text class="text" x="520" y="220" text-anchor="middle">2. ClientHello：版本、随机数、SNI、套件</text>
  <line class="back" x1="835" y1="300" x2="205" y2="300"/><text class="text" x="520" y="285" text-anchor="middle">3. ServerHello + 证书 + 参数</text>
  <line class="msg" x1="205" y1="365" x2="835" y2="365"/><text class="text" x="520" y="350" text-anchor="middle">4. 验证证书，协商密钥，完成握手</text>
  <line class="secure" x1="205" y1="435" x2="835" y2="435"/><text class="text" x="520" y="420" text-anchor="middle">5. 加密 HTTP 请求 / 响应</text>
  <text class="small" x="520" y="525" text-anchor="middle">这是初学简化图；TLS 1.2、TLS 1.3 和 QUIC/TLS 的细节不同。</text>
</svg>
