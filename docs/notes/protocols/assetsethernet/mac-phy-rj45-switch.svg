<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="470" viewBox="0 0 1080 470" role="img" aria-labelledby="title desc">
  <title id="title">MAC PHY RJ45 switch relation</title>
  <desc id="desc">Embedded Ethernet architecture from MCU MAC to PHY, magnetics, RJ45, cable and switch.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.mcu{fill:#dbeafe}.phy{fill:#dcfce7}.conn{fill:#fef3c7}.sw{fill:#fee2e2}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:19px;fill:#0f172a}.title{font-size:25px;font-weight:700}.small{font-size:15px;fill:#475569}
      .arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1080" height="470"/>
  <text class="text title" x="540" y="45" text-anchor="middle">MAC、PHY、RJ45、交换机的关系</text>
  <rect class="box mcu" x="55" y="120" width="190" height="110"/><text class="text" x="150" y="156" text-anchor="middle">MCU / SoC</text><text class="small" x="150" y="184" text-anchor="middle">Ethernet MAC</text><text class="small" x="150" y="208" text-anchor="middle">DMA / Descriptor</text>
  <rect class="box phy" x="330" y="120" width="170" height="110"/><text class="text" x="415" y="156" text-anchor="middle">PHY</text><text class="small" x="415" y="184" text-anchor="middle">编码、协商</text><text class="small" x="415" y="208" text-anchor="middle">Link 状态</text>
  <rect class="box conn" x="585" y="120" width="170" height="110"/><text class="text" x="670" y="156" text-anchor="middle">磁性器件</text><text class="small" x="670" y="184" text-anchor="middle">隔离、匹配</text><text class="small" x="670" y="208" text-anchor="middle">RJ45 网口</text>
  <rect class="box sw" x="840" y="120" width="180" height="110"/><text class="text" x="930" y="156" text-anchor="middle">交换机</text><text class="small" x="930" y="184" text-anchor="middle">学习 MAC</text><text class="small" x="930" y="208" text-anchor="middle">转发帧</text>

  <line class="arrow" x1="245" y1="175" x2="330" y2="175"/><text class="small" x="287" y="158" text-anchor="middle">RMII/MII</text>
  <line class="arrow" x1="500" y1="175" x2="585" y2="175"/><text class="small" x="542" y="158" text-anchor="middle">模拟侧</text>
  <line class="arrow" x1="755" y1="175" x2="840" y2="175"/><text class="small" x="797" y="158" text-anchor="middle">网线</text>

  <rect class="box" x="160" y="305" width="760" height="80"/>
  <text class="text" x="540" y="336" text-anchor="middle">软件路径：应用 -> TCP/IP 协议栈 -> 网卡驱动 -> MAC DMA -> PHY</text>
  <text class="small" x="540" y="363" text-anchor="middle">硬件细节与 MCU、PHY、板级电路强相关，需参考芯片手册和官方参考设计。</text>
</svg>
