site_name: ZY Engineering Notes
site_url: https://zhyun828.github.io/
site_description: Notes on embedded systems, robotics, C++, FPGA, and interview preparation.

theme:
  name: material
  language: zh
  font: false
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: 深色模式
    - scheme: slate
      primary: blue grey
      accent: cyan
      toggle:
        icon: material/white-balance-sunny
        name: 浅色模式
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.indexes
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/home.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Notes:
      - Overview: notes/index.md
      - 通信协议:
          - Overview: notes/protocols/index.md
          - USART: notes/protocols/usart.md
          - I2C: notes/protocols/i2c.md
          - SPI: notes/protocols/spi.md
          - CAN: notes/protocols/can.md
          - TCP / UDP / IP: notes/protocols/tcp-udp-ip.md
          - Modbus: notes/protocols/modbus.md
          - Ethernet: notes/protocols/ethernet.md
          - LIN: notes/protocols/lin.md
          - HTTP / HTTPS: notes/protocols/http-https.md
      - 面试:
          - 快速检索表: notes/面试/快速检索表.md
          - 嵌入式面试汇总表: notes/面试/嵌入式面试汇总表.md
          - 高频题深度解析: notes/面试/高频题深度解析.md
          - 项目经历问答面试: notes/面试/项目经历问答面试.md
      - Arduino:
          - basics: notes/Arduino/basics.md
          - projet:
              - projet: notes/Arduino/projet/projet.md
              - pre: notes/Arduino/projet/pre.md
              - code: notes/Arduino/projet/code.md
              - thoughts: notes/Arduino/projet/thoughts.md
      - Cpp:
          - basics: notes/Cpp/basics.md
          - code: notes/Cpp/code.md
          - 设计模式详解: notes/Cpp/cpp_设计模式详解_扩展版.md
      - embedded_system:
          - basic: notes/embedded_system/basic.md
          - TP:
              - README: notes/embedded_system/TP/README.md
      - FPGA:
          - basics: notes/FPGA/basics.md
      - gazebo:
          - basic: notes/ros/gazebo/basic.md
      - linux:
          - basic: notes/linux/basic.md
      - LVGL:
          - basic: notes/LVGL/basic.md
      - ros:
          - basic: notes/ros/basic.md
          - code: notes/ros/code.md
      - stm32:
          - stm32_knowledge_notes: notes/stm32/stm32_knowledge_notes.md
          - 外设: notes/stm32/外设.md
          - 寄存器: notes/stm32/寄存器.md
