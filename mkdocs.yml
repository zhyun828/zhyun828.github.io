site_name: ZY Engineering Notes
site_url: https://zhyun828.github.io/
site_description: Notes on embedded systems, robotics, C++, FPGA, and interview preparation.

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: 深色模式
    - scheme: slate
      toggle:
        icon: material/white-balance-sunny
        name: 浅色模式
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Notes:
      - Arduino & Control:
          - Arduino Basics: notes/Arduino/basics.md
          - Temperature Indicator Project:
              - Project Overview: notes/Arduino/projet/projet.md
              - Presentation Notes: notes/Arduino/projet/pre.md
              - Code Walkthrough: notes/Arduino/projet/code.md
              - Reflection Notes: notes/Arduino/projet/thoughts.md
      - C++ & Software:
          - C++ Basics: notes/Cpp/basics.md
          - Object-Oriented Programming: notes/Cpp/opp.md
          - Code Snippets: notes/Cpp/code.md
          - Design Patterns: notes/Cpp/cpp_设计模式详解_扩展版.md
      - Robotics & Linux:
          - Linux Basics: notes/linux/basic.md
          - ROS Basics: notes/ros/basic.md
          - ROS Communication Code: notes/ros/code.md
          - Gazebo Basics: notes/gazebo/basic.md
      - FPGA & Digital Logic:
          - FPGA Basics: notes/FPGA/basics.md
      - Embedded Systems:
          - Overview: notes/embedded_system/basic.md
          - BeagleBone Linear Slide Project: notes/embedded_system/TP/README.md
  - Interview Prep:
      - Quick Index: notes/面试/快速检索表.md
      - Categorized Question Bank: notes/面试/嵌入式面试汇总表.md
      - 50 Interview Questions: notes/面试/嵌入式面试问题.md
      - Deep-Dive Answers: notes/面试/高频题深度解析.md
      - Project Q&A: notes/面试/项目经历问答面试.md
