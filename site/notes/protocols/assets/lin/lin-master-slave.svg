<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="430" viewBox="0 0 1040 430" role="img" aria-labelledby="title desc">
  <title id="title">LIN master slave topology</title>
  <desc id="desc">Single LIN master schedules a one wire bus with multiple slave nodes.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.bus{stroke:#16a34a;stroke-width:7;stroke-linecap:round}.stub{stroke:#16a34a;stroke-width:4}
      .master{fill:#dbeafe;stroke:#1d4ed8;stroke-width:2;rx:12}.slave{fill:#dcfce7;stroke:#15803d;stroke-width:2;rx:12}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:20px;fill:#0f172a}.title{font-size:25px;font-weight:700}.small{font-size:16px;fill:#475569}
      .arrow{stroke:#64748b;stroke-width:2;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1040" height="430"/>
  <text class="text title" x="520" y="46" text-anchor="middle">LIN 单主多从结构</text>
  <line class="bus" x1="115" y1="230" x2="925" y2="230"/>
  <text class="small" x="520" y="260" text-anchor="middle">单根 LIN 信号线，外加电源和地</text>

  <line class="stub" x1="200" y1="145" x2="200" y2="230"/>
  <rect class="master" x="105" y="75" width="190" height="70"/><text class="text" x="200" y="105" text-anchor="middle">主节点</text><text class="small" x="200" y="130" text-anchor="middle">Master，发送 Header</text>

  <line class="stub" x1="430" y1="230" x2="430" y2="315"/>
  <rect class="slave" x="335" y="315" width="190" height="70"/><text class="text" x="430" y="345" text-anchor="middle">从节点 A</text><text class="small" x="430" y="370" text-anchor="middle">发布或订阅</text>

  <line class="stub" x1="630" y1="230" x2="630" y2="315"/>
  <rect class="slave" x="535" y="315" width="190" height="70"/><text class="text" x="630" y="345" text-anchor="middle">从节点 B</text><text class="small" x="630" y="370" text-anchor="middle">发布或订阅</text>

  <line class="stub" x1="820" y1="230" x2="820" y2="315"/>
  <rect class="slave" x="725" y="315" width="190" height="70"/><text class="text" x="820" y="345" text-anchor="middle">从节点 C</text><text class="small" x="820" y="370" text-anchor="middle">发布或订阅</text>

  <line class="arrow" x1="295" y1="105" x2="430" y2="105"/><text class="small" x="365" y="90" text-anchor="middle">调度表决定谁响应</text>
</svg>
