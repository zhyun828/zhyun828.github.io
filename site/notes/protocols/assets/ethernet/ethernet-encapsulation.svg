<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="520" viewBox="0 0 1080 520" role="img" aria-labelledby="title desc">
  <title id="title">Application data encapsulated into Ethernet frame</title>
  <desc id="desc">Application data is encapsulated by TCP UDP, IP and Ethernet before being sent by PHY.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.app{fill:#dbeafe}.tcp{fill:#dcfce7}.ip{fill:#fef3c7}.eth{fill:#fee2e2}.phy{fill:#ede9fe}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:19px;fill:#0f172a}.title{font-size:25px;font-weight:700}.small{font-size:15px;fill:#475569}
      .arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1080" height="520"/>
  <text class="text title" x="540" y="45" text-anchor="middle">应用数据封装为 Ethernet 帧</text>
  <rect class="box app" x="75" y="110" width="175" height="75"/><text class="text" x="162" y="140" text-anchor="middle">应用数据</text><text class="small" x="162" y="165" text-anchor="middle">HTTP/MQTT</text>
  <line class="arrow" x1="250" y1="148" x2="310" y2="148"/>
  <rect class="box tcp" x="310" y="110" width="175" height="75"/><text class="text" x="397" y="140" text-anchor="middle">TCP/UDP</text><text class="small" x="397" y="165" text-anchor="middle">端口、可靠性</text>
  <line class="arrow" x1="485" y1="148" x2="545" y2="148"/>
  <rect class="box ip" x="545" y="110" width="175" height="75"/><text class="text" x="632" y="140" text-anchor="middle">IP</text><text class="small" x="632" y="165" text-anchor="middle">源/目的 IP</text>
  <line class="arrow" x1="720" y1="148" x2="780" y2="148"/>
  <rect class="box eth" x="780" y="110" width="225" height="75"/><text class="text" x="892" y="140" text-anchor="middle">Ethernet 帧</text><text class="small" x="892" y="165" text-anchor="middle">源/目的 MAC、FCS</text>

  <line class="arrow" x1="892" y1="185" x2="892" y2="255"/>
  <rect class="box phy" x="705" y="255" width="375" height="72"/><text class="text" x="892" y="286" text-anchor="middle">PHY 转换成网线上的电信号</text><text class="small" x="892" y="311" text-anchor="middle">100BASE-TX / 1000BASE-T 等</text>

  <rect class="box" x="145" y="385" width="790" height="70"/>
  <text class="small" x="540" y="415" text-anchor="middle">下层不理解上层业务，只把上层数据当作 Payload；接收端按相反顺序解封装。</text>
  <text class="small" x="540" y="440" text-anchor="middle">这就是为什么抓包能逐层展开 Ethernet、IP、TCP/UDP、应用协议。</text>
</svg>
