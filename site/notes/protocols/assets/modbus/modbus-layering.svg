<svg xmlns="http://www.w3.org/2000/svg" width="980" height="440" viewBox="0 0 980 440" role="img" aria-labelledby="title desc">
  <title id="title">Modbus protocol layering</title>
  <desc id="desc">Relationship between Modbus application layer, RTU ASCII TCP encapsulation, UART RS-232 RS-485 and TCP IP Ethernet.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:10}.head{fill:#e0f2fe;stroke:#0369a1;stroke-width:2;rx:10}
      .serial{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:10}.tcp{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:10}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:22px;fill:#0f172a}.small{font-size:18px;fill:#334155}.label{font-size:20px;font-weight:700}
      .arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect class="bg" x="0" y="0" width="980" height="440"/>
  <rect class="head" x="260" y="32" width="460" height="74"/>
  <text class="text label" x="490" y="63" text-anchor="middle">Modbus 应用层</text>
  <text class="text small" x="490" y="91" text-anchor="middle">PDU = 功能码 + 数据</text>

  <line class="arrow" x1="490" y1="112" x2="250" y2="155"/>
  <line class="arrow" x1="490" y1="112" x2="490" y2="155"/>
  <line class="arrow" x1="490" y1="112" x2="730" y2="155"/>

  <rect class="serial" x="80" y="160" width="260" height="78"/>
  <text class="text label" x="210" y="192" text-anchor="middle">Modbus RTU</text>
  <text class="text small" x="210" y="220" text-anchor="middle">二进制 + CRC + 帧间隔</text>

  <rect class="serial" x="360" y="160" width="260" height="78"/>
  <text class="text label" x="490" y="192" text-anchor="middle">Modbus ASCII</text>
  <text class="text small" x="490" y="220" text-anchor="middle">ASCII 十六进制 + LRC</text>

  <rect class="tcp" x="640" y="160" width="260" height="78"/>
  <text class="text label" x="770" y="192" text-anchor="middle">Modbus TCP</text>
  <text class="text small" x="770" y="220" text-anchor="middle">MBAP Header + TCP</text>

  <line class="arrow" x1="210" y1="242" x2="210" y2="285"/>
  <line class="arrow" x1="490" y1="242" x2="490" y2="285"/>
  <line class="arrow" x1="770" y1="242" x2="770" y2="285"/>

  <rect class="box" x="80" y="292" width="260" height="88"/>
  <text class="text label" x="210" y="324" text-anchor="middle">UART</text>
  <text class="text small" x="210" y="352" text-anchor="middle">RS-232 / RS-485 收发器</text>

  <rect class="box" x="360" y="292" width="260" height="88"/>
  <text class="text label" x="490" y="324" text-anchor="middle">UART</text>
  <text class="text small" x="490" y="352" text-anchor="middle">RS-232 / RS-485 收发器</text>

  <rect class="box" x="640" y="292" width="260" height="88"/>
  <text class="text label" x="770" y="324" text-anchor="middle">Ethernet</text>
  <text class="text small" x="770" y="352" text-anchor="middle">TCP / IP，常用端口 502</text>

  <text class="text small" x="490" y="415" text-anchor="middle">结论：RS-485 是物理层，Modbus 是上层协议，二者不是同一层概念。</text>
</svg>
