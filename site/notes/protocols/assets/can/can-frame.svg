<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="260" viewBox="0 0 1120 260" role="img" aria-label="Classic CAN data frame">
  <rect width="1120" height="260" fill="#fff"/>
  <style>
    text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#1f2933}
    .title{font-size:24px;font-weight:700}
    .small{font-size:15px}
    .cell{stroke:#243b53;stroke-width:1.5}
  </style>
  <text x="36" y="42" class="title">经典 CAN 数据帧结构</text>
  <g transform="translate(36,80)">
    <rect class="cell" x="0" y="0" width="70" height="70" fill="#fee2e2"/><text x="18" y="42" class="small">SOF</text>
    <rect class="cell" x="70" y="0" width="160" height="70" fill="#dbeafe"/><text x="105" y="35" class="small">Identifier</text><text x="115" y="55" class="small">11 / 29 bit</text>
    <rect class="cell" x="230" y="0" width="120" height="70" fill="#e0f2fe"/><text x="258" y="42" class="small">Control</text>
    <rect class="cell" x="350" y="0" width="220" height="70" fill="#fef9c3"/><text x="405" y="35" class="small">Data Field</text><text x="420" y="55" class="small">0...8 byte</text>
    <rect class="cell" x="570" y="0" width="130" height="70" fill="#ede9fe"/><text x="615" y="42" class="small">CRC</text>
    <rect class="cell" x="700" y="0" width="95" height="70" fill="#dcfce7"/><text x="728" y="42" class="small">ACK</text>
    <rect class="cell" x="795" y="0" width="100" height="70" fill="#f3f4f6"/><text x="832" y="42" class="small">EOF</text>
    <rect class="cell" x="895" y="0" width="135" height="70" fill="#f3f4f6"/><text x="927" y="35" class="small">Inter</text><text x="919" y="55" class="small">mission</text>
  </g>
  <text x="36" y="190" class="small">Identifier 同时承担“消息含义”和“仲裁优先级”；ACK 表示至少一个接收节点正确收到帧。</text>
</svg>
