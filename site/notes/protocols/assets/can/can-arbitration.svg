<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360" role="img" aria-label="CAN non destructive arbitration">
  <rect width="1080" height="360" fill="#fff"/>
  <style>
    text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#1f2933}
    .title{font-size:24px;font-weight:700}
    .small{font-size:16px}
    .bit{stroke:#243b53;stroke-width:1.3}
    .dom{fill:#fecaca}
    .rec{fill:#e5e7eb}
    .lose{fill:#fee2e2;stroke:#ef4444;stroke-width:2}
  </style>
  <text x="36" y="42" class="title">CAN 非破坏性仲裁：ID 小者优先</text>
  <text x="36" y="70" class="small">0 为显性位，1 为隐性位；发送 1 却读回 0 的节点仲裁失败并转入接收</text>
  <g transform="translate(170,105)">
    <text x="-115" y="28" class="small">Node A ID</text>
    <text x="-115" y="88" class="small">Node B ID</text>
    <text x="-115" y="148" class="small">Bus</text>
    <g>
      <rect class="bit dom" x="0" y="0" width="55" height="40"/><text x="22" y="26" class="small">0</text>
      <rect class="bit dom" x="55" y="0" width="55" height="40"/><text x="77" y="26" class="small">0</text>
      <rect class="bit rec" x="110" y="0" width="55" height="40"/><text x="132" y="26" class="small">1</text>
      <rect class="bit dom" x="165" y="0" width="55" height="40"/><text x="187" y="26" class="small">0</text>
      <rect class="bit rec" x="220" y="0" width="55" height="40"/><text x="242" y="26" class="small">1</text>
    </g>
    <g transform="translate(0,60)">
      <rect class="bit dom" x="0" y="0" width="55" height="40"/><text x="22" y="26" class="small">0</text>
      <rect class="bit dom" x="55" y="0" width="55" height="40"/><text x="77" y="26" class="small">0</text>
      <rect class="bit dom" x="110" y="0" width="55" height="40"/><text x="132" y="26" class="small">0</text>
      <rect class="bit rec" x="165" y="0" width="55" height="40"/><text x="187" y="26" class="small">1</text>
      <rect class="bit rec" x="220" y="0" width="55" height="40"/><text x="242" y="26" class="small">1</text>
    </g>
    <g transform="translate(0,120)">
      <rect class="bit dom" x="0" y="0" width="55" height="40"/><text x="22" y="26" class="small">0</text>
      <rect class="bit dom" x="55" y="0" width="55" height="40"/><text x="77" y="26" class="small">0</text>
      <rect class="bit dom" x="110" y="0" width="55" height="40"/><text x="132" y="26" class="small">0</text>
      <rect class="bit dom" x="165" y="0" width="55" height="40"/><text x="187" y="26" class="small">0</text>
      <rect class="bit rec" x="220" y="0" width="55" height="40"/><text x="242" y="26" class="small">1</text>
    </g>
    <rect class="lose" x="110" y="-8" width="55" height="116" rx="4"/>
    <text x="340" y="52" class="small">A 在该位发送 1</text>
    <text x="340" y="82" class="small">总线被 B 的 0 拉成显性</text>
    <text x="340" y="112" class="small">A 读回 0，仲裁失败</text>
  </g>
</svg>
