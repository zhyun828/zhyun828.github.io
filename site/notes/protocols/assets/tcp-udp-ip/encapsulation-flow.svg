<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Application data encapsulation flow</title>
  <desc id="desc">Application data is encapsulated by TCP or UDP, then IP, then Ethernet frame.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#334155;stroke-width:2;rx:12}.app{fill:#dbeafe}.tcp{fill:#dcfce7}.ip{fill:#fef3c7}.eth{fill:#fee2e2}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:19px;fill:#0f172a}.title{font-size:26px;font-weight:700}.small{font-size:15px;fill:#475569}
      .arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1100" height="520"/>
  <text class="text title" x="550" y="48" text-anchor="middle">应用数据逐层封装发送</text>

  <rect class="box app" x="95" y="110" width="190" height="75"/><text class="text" x="190" y="141" text-anchor="middle">应用数据</text><text class="small" x="190" y="166" text-anchor="middle">HTTP / MQTT / 自定义</text>
  <line class="arrow" x1="285" y1="148" x2="345" y2="148"/>
  <rect class="box tcp" x="345" y="105" width="210" height="85"/><text class="text" x="450" y="136" text-anchor="middle">TCP/UDP 头</text><text class="small" x="450" y="161" text-anchor="middle">端口、序号或长度</text>
  <line class="arrow" x1="555" y1="148" x2="615" y2="148"/>
  <rect class="box ip" x="615" y="105" width="210" height="85"/><text class="text" x="720" y="136" text-anchor="middle">IP 头</text><text class="small" x="720" y="161" text-anchor="middle">源 IP、目的 IP</text>
  <line class="arrow" x1="825" y1="148" x2="885" y2="148"/>
  <rect class="box eth" x="885" y="105" width="160" height="85"/><text class="text" x="965" y="136" text-anchor="middle">链路层帧</text><text class="small" x="965" y="161" text-anchor="middle">MAC、FCS</text>

  <rect class="box" x="165" y="285" width="770" height="95"/>
  <text class="text" x="550" y="318" text-anchor="middle">接收方反向解封装</text>
  <text class="small" x="550" y="348" text-anchor="middle">网卡收帧 -> IP 根据目的地址和 Protocol 分发 -> TCP/UDP 根据端口交给 socket -> 应用读取数据</text>

  <text class="small" x="550" y="450" text-anchor="middle">每一层都只关心自己的头部和职责；上层数据对下层来说只是 Payload。</text>
</svg>
