<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="500" viewBox="0 0 1080 500" role="img" aria-labelledby="title desc">
  <title id="title">TCP listen queues and connection states</title>
  <desc id="desc">TCP server listen flow with SYN queue, accept queue, ESTABLISHED, TIME_WAIT and CLOSE_WAIT states.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.c{fill:#dbeafe;stroke:#2563eb;stroke-width:2;rx:12}.q{fill:#fef3c7;stroke:#d97706;stroke-width:2;rx:12}.s{fill:#dcfce7;stroke:#16a34a;stroke-width:2;rx:12}.e{fill:#fee2e2;stroke:#dc2626;stroke-width:2;rx:12}
      .text{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;fill:#0f172a}.title{font-size:25px;font-weight:700}.small{font-size:15px;fill:#475569}.arrow{stroke:#64748b;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#64748b"/></marker>
  </defs>
  <rect class="bg" width="1080" height="500"/>
  <text class="text title" x="540" y="45" text-anchor="middle">TCP 队列与常见状态</text>
  <rect class="c" x="80" y="105" width="160" height="68"/><text class="text" x="160" y="133" text-anchor="middle">Client</text><text class="small" x="160" y="156" text-anchor="middle">发送 SYN</text>
  <rect class="q" x="310" y="105" width="180" height="68"/><text class="text" x="400" y="133" text-anchor="middle">半连接队列</text><text class="small" x="400" y="156" text-anchor="middle">SYN_RECV</text>
  <rect class="q" x="560" y="105" width="180" height="68"/><text class="text" x="650" y="133" text-anchor="middle">全连接队列</text><text class="small" x="650" y="156" text-anchor="middle">等待 accept</text>
  <rect class="s" x="810" y="105" width="180" height="68"/><text class="text" x="900" y="133" text-anchor="middle">ESTABLISHED</text><text class="small" x="900" y="156" text-anchor="middle">收发数据</text>
  <line class="arrow" x1="240" y1="139" x2="310" y2="139"/><line class="arrow" x1="490" y1="139" x2="560" y2="139"/><line class="arrow" x1="740" y1="139" x2="810" y2="139"/>

  <rect class="e" x="185" y="300" width="220" height="74"/><text class="text" x="295" y="329" text-anchor="middle">TIME_WAIT</text><text class="small" x="295" y="354" text-anchor="middle">主动关闭方常见</text>
  <rect class="e" x="675" y="300" width="220" height="74"/><text class="text" x="785" y="329" text-anchor="middle">CLOSE_WAIT</text><text class="small" x="785" y="354" text-anchor="middle">应用未及时 close</text>
  <text class="small" x="540" y="430" text-anchor="middle">队列和状态的具体名称、大小和策略与操作系统有关，但排障思路相通。</text>
</svg>
