<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="360" viewBox="0 0 1050 360" role="img" aria-label="SPI flash command address read and write sequences">
  <rect width="1050" height="360" fill="#fff"/>
  <style>
    text{font-family:Arial,"Microsoft YaHei",sans-serif;fill:#1f2933}
    .title{font-size:24px;font-weight:700}
    .row{font-size:20px;font-weight:700}
    .small{font-size:16px}
    .cs{fill:#fee2e2;stroke:#ef4444;stroke-width:1.6}
    .cmd{fill:#eff6ff;stroke:#2563eb;stroke-width:1.6}
    .addr{fill:#ede9fe;stroke:#7c3aed;stroke-width:1.6}
    .data{fill:#fef9c3;stroke:#ca8a04;stroke-width:1.6}
  </style>
  <text x="36" y="42" class="title">SPI Flash 常见命令时序</text>
  <g transform="translate(40,85)">
    <text x="0" y="30" class="row">写使能</text>
    <rect x="150" y="5" width="80" height="42" rx="6" class="cs"/><text x="174" y="32" class="small">CS↓</text>
    <rect x="240" y="5" width="160" height="42" rx="6" class="cmd"/><text x="270" y="32" class="small">0x06 command</text>
    <rect x="410" y="5" width="80" height="42" rx="6" class="cs"/><text x="434" y="32" class="small">CS↑</text>
  </g>
  <g transform="translate(40,165)">
    <text x="0" y="30" class="row">指定地址写</text>
    <rect x="150" y="5" width="80" height="42" rx="6" class="cs"/><text x="174" y="32" class="small">CS↓</text>
    <rect x="240" y="5" width="155" height="42" rx="6" class="cmd"/><text x="270" y="32" class="small">0x02 Write</text>
    <rect x="405" y="5" width="170" height="42" rx="6" class="addr"/><text x="432" y="32" class="small">Address[23:0]</text>
    <rect x="585" y="5" width="120" height="42" rx="6" class="data"/><text x="624" y="32" class="small">Data</text>
    <rect x="715" y="5" width="80" height="42" rx="6" class="cs"/><text x="739" y="32" class="small">CS↑</text>
  </g>
  <g transform="translate(40,245)">
    <text x="0" y="30" class="row">指定地址读</text>
    <rect x="150" y="5" width="80" height="42" rx="6" class="cs"/><text x="174" y="32" class="small">CS↓</text>
    <rect x="240" y="5" width="155" height="42" rx="6" class="cmd"/><text x="272" y="32" class="small">0x03 Read</text>
    <rect x="405" y="5" width="170" height="42" rx="6" class="addr"/><text x="432" y="32" class="small">Address[23:0]</text>
    <rect x="585" y="5" width="120" height="42" rx="6" class="data"/><text x="617" y="32" class="small">MISO Data</text>
    <rect x="715" y="5" width="80" height="42" rx="6" class="cs"/><text x="739" y="32" class="small">CS↑</text>
  </g>
</svg>
